<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nosso Amor Supera Tudo</title>

<style>

body{
margin:0;
background:#ffd9ec;
overflow:hidden;
font-family:sans-serif;
}

#game{
position:relative;
width:100%;
height:300px;
border-bottom:4px solid #ff2f7d;
}

#player{
position:absolute;
bottom:0;
left:60px;
width:80px;
}

#player img{
width:100%;
}

#obstacle{
position:absolute;
bottom:0;
right:-60px;
width:35px;   /* DIMINUÍDO */
height:35px;  /* DIMINUÍDO */
background:#ff2f7d;
border-radius:6px;
animation: obstacleMove 2s linear infinite;
}

@keyframes obstacleMove{
0%{right:-60px;}
100%{right:100%;}
}

.jump{
animation:jump 0.5s;
}

@keyframes jump{
0%{bottom:0;}
50%{bottom:120px;}
100%{bottom:0;}
}

</style>
</head>

<body>

<div id="game">

<div id="player">
<img src="personagem.png">
</div>

<div id="obstacle"></div>

</div>

<script>

const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

function jump(){

if(player.classList.contains("jump")) return;

player.classList.add("jump");

setTimeout(()=>{
player.classList.remove("jump");
},500)

}

let check = setInterval(()=>{

let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
let obstacleLeft = obstacle.getBoundingClientRect().left;

if(obstacleLeft < 120 && obstacleLeft > 50 && playerBottom < 40){
alert("Vocês tropeçaram em uma dificuldade 😢");
location.reload();
}

},10)

</script>

</body>
</html>
